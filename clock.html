<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .clock {
            margin: 20px;
            font-size: 2.5em;
        }
        .timezone {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Multi-Time Zone Digital Clock</h1>
    <div class="clock" id="clock"></div>

    <div class="timezone" id="new-york"></div>
    <div class="timezone" id="london"></div>
    <div class="timezone" id="tokyo"></div>
    <div class="timezone" id="sydney"></div>
    <div class="timezone" id="dubai"></div>
    <div class="timezone" id="india"></div>

    <script>
        function updateClock() {
            const options = { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('new-york').textContent = 'New York: ' + new Intl.DateTimeFormat('en-US', options).format(new Date());

            options.timeZone = 'Europe/London';
            document.getElementById('london').textContent = 'London: ' + new Intl.DateTimeFormat('en-GB', options).format(new Date());

            options.timeZone = 'Asia/Tokyo';
            document.getElementById('tokyo').textContent = 'Tokyo: ' + new Intl.DateTimeFormat('ja-JP', options).format(new Date());

            options.timeZone = 'Australia/Sydney';
            document.getElementById('sydney').textContent = 'Sydney: ' + new Intl.DateTimeFormat('en-AU', options).format(new Date());

            options.timeZone = 'Asia/Dubai';
            document.getElementById('dubai').textContent = 'Dubai: ' + new Intl.DateTimeFormat('en-AE', options).format(new Date());

            options.timeZone = 'Asia/Kolkata';
            document.getElementById('india').textContent = 'India: ' + new Intl.DateTimeFormat('en-IN', options).format(new Date());
        }

        setInterval(updateClock, 1000);
        updateClock(); // initial call
    </script>
</body>
</html>
